<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="تسجيل الدخول إلى ASK_tech">
    <title>ASK_tech | تسجيل الدخول</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/AIStyle.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-bg-effects">
            <div class="hero-orb hero-orb-1"></div>
            <div class="hero-orb hero-orb-2"></div>
        </div>
        <div class="auth-card">
            <a href="/" class="logo auth-logo">
                <span class="logo-icon"><i class="fas fa-rocket"></i></span>
                <span class="logo-text">ASK<span class="logo-accent">_tech</span></span>
            </a>

            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login" id="loginTab">تسجيل الدخول</button>
                <button class="auth-tab" data-tab="register" id="registerTab">حساب جديد</button>
                <div class="auth-tab-indicator" id="tabIndicator"></div>
            </div>

            <!-- Login Form -->
            <form class="auth-form active" id="loginForm">
                <div class="form-group">
                    <label for="loginEmail"><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
                    <input type="email" id="loginEmail" placeholder="example@email.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="loginPassword"><i class="fas fa-lock"></i> كلمة المرور</label>
                    <div class="password-wrapper">
                        <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
                        <button type="button" class="password-toggle" data-target="loginPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-lg btn-block" id="loginBtn">
                    <span class="btn-text">تسجيل الدخول</span>
                    <span class="btn-loader" style="display:none"><i class="fas fa-spinner fa-spin"></i></span>
                </button>
            </form>

            <!-- Register Form -->
            <form class="auth-form" id="registerForm">
                <div class="form-group">
                    <label for="regName"><i class="fas fa-user"></i> الاسم الكامل</label>
                    <input type="text" id="regName" placeholder="أدخل اسمك الكامل" required>
                </div>
                <div class="form-group">
                    <label for="regEmail"><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
                    <input type="email" id="regEmail" placeholder="example@email.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="regPassword"><i class="fas fa-lock"></i> كلمة المرور</label>
                    <div class="password-wrapper">
                        <input type="password" id="regPassword" placeholder="6 أحرف على الأقل" required minlength="6" autocomplete="new-password">
                        <button type="button" class="password-toggle" data-target="regPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-lg btn-block" id="regBtn">
                    <span class="btn-text">إنشاء حساب</span>
                    <span class="btn-loader" style="display:none"><i class="fas fa-spinner fa-spin"></i></span>
                </button>
            </form>

            <div id="authMessage" class="auth-message"></div>
        </div>
    </div>
    <script src="/AIScript.js"></script>
</body>
</html>
